<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print Preview</title>
    <style>
      body { font-family: Georgia, serif; margin: 40px; color: #111; }
      h1 { font-size: 2.4rem; margin-bottom: 0.5rem; }
      h2, h3, h4 { color: #1f2937; margin-top: 1.5rem; }
      p { line-height: 1.8; font-size: 1rem; margin-bottom: 1rem; }
      .meta { margin-bottom: 1rem; }
      .meta strong { display: inline-block; width: 160px; }
      .section { margin-top: 1.5rem; }
      .print-button { margin-bottom: 20px; padding: 10px 18px; background: #2563eb; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
      .preview-container { max-width: 900px; }
      @media print {
        .print-button { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="preview-container">
      <button class="print-button" onclick="window.print()">Print / Save as PDF</button>
      <h1>{{ title }}</h1>
      <div class="meta"><strong>Keyword:</strong> {{ keyword }}</div>
      <div class="meta"><strong>Supporting keyword:</strong> {{ supporting_keyword }}</div>
      <div class="meta"><strong>Meta description:</strong> {{ meta_description }}</div>
      <div class="section">{{ content_html|safe }}</div>
    </div>
  </body>
</html>
